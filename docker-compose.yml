version: "3.9"

services:
  backend:
    build: ./backend
    container_name: churn-backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: churn-frontend
    ports:
      - "8501:8501"
    environment:
      # Point frontend at the backend service name (Docker DNS)
      - BACKEND_URL=http://backend:5000
    depends_on:
      - backend
    restart: unless-stopped
